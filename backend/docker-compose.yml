services:
  db:
    image: postgres:15
    container_name: globalmitra-db
    environment:
      POSTGRES_DB: GlobalMitraDB
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: "Subash@@2314##21"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d GlobalMitraDB"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build: .
    container_name: backend
    ports:
      - "8005:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - media_files:/app/media
    stdin_open: true
    tty: true

  adminer:
    image: adminer:latest
    container_name: globalmitra-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db

volumes:
  postgres_data:
  media_files: